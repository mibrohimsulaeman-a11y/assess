name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  smoke:
    name: zero-dependency graph checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run honesty fixtures
        run: node packages/core/test/run-fixtures.cjs
      - name: Validate sample graph
        run: node packages/core/scripts/validate-graph.cjs packages/dashboard/public/assessment-graph.json

  build:
    name: workspace build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: 10.6.2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Test
        run: pnpm test
      - name: Build
        run: pnpm build
