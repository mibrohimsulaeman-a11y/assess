name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  smoke:
    name: zero-dependency contract checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Run honesty fixtures
        run: node packages/core/test/run-fixtures.cjs
      - name: Run review decision fixtures
        run: node packages/core/test/review-decision-fixtures.cjs
      - name: Run dashboard review readiness helpers
        run: node packages/dashboard/test/review-readiness.cjs
      - name: Validate sample graph
        run: node packages/core/scripts/validate-graph.cjs packages/dashboard/public/assessment-graph.json
      - name: Engine end-to-end (self-validating atomic write)
        run: node packages/core/runtime/assess-run.mjs --repo packages/core/src --intent examples/intent/assess-core.intent.json --out .assessment
      - name: MCP server contract
        run: node plugins/assess/mcp/test/mcp-contract.cjs

  build:
    name: workspace build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10.6.2
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Test
        run: pnpm test
      - name: Build
        run: pnpm build
