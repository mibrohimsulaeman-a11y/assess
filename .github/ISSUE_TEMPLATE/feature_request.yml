name: Feature request
description: Suggest a capability or workflow improvement
title: "feat: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What assessment or workflow problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should assess do?
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence model
      description: What deterministic evidence would support this feature?
